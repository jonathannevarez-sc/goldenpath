# Reusable Golden Path deploy workflow.
# Service repos call:
#   uses: YOUR_ORG/YOUR_PLATFORM_REPO/.github/workflows/deploy.yml@YOUR_GOLDENPATH_VERSION
# Optional secret GOLDENPATH_MODULE_TOKEN: PAT for private module fetch (falls back to github.token)

name: Golden Path Deploy

on:
  workflow_call:
    inputs:
      service_name:
        description: Shop service name
        required: true
        type: string
      environment:
        description: Target environment (dev or prod)
        required: true
        type: string
      gcp_project:
        description: GCP project ID
        required: true
        type: string
      gcp_region:
        description: GCP region (from service infra tfvars / enterprise.env)
        required: true
        type: string
      artifact_registry_repo:
        description: Artifact Registry repository ID (from enterprise.env ARTIFACT_REGISTRY_REPO)
        required: true
        type: string
      goldenpath_org:
        description: GitHub org hosting platform modules
        required: true
        type: string
      goldenpath_repo:
        description: Platform repo name (modules + this workflow; usually goldenpath)
        required: false
        type: string
        default: goldenpath
      goldenpath_version:
        description: Git tag of platform modules (from enterprise.env GOLDENPATH_VERSION)
        required: true
        type: string
      terraform_working_directory:
        description: Path to Terraform in the service repo
        required: false
        type: string
        default: infra
      app_runtime:
        description: "node | python | docker (docker = build only in Dockerfile, no CI npm/pip)"
        required: false
        type: string
        default: node
      health_check_path:
        description: Path for post-deploy smoke check
        required: false
        type: string
        default: /api/health
      node_version:
        required: false
        type: string
        default: "20"
      python_version:
        required: false
        type: string
        default: "3.12"
    secrets:
      GCP_WIF_PROVIDER:
        required: true
      GCP_WIF_SERVICE_ACCOUNT:
        required: true
      GOLDENPATH_MODULE_TOKEN:
        description: Optional PAT for private goldenpath Terraform module fetch (falls back to github.token)
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy ${{ inputs.service_name }} (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      SERVICE_NAME: ${{ inputs.service_name }}
      ENVIRONMENT: ${{ inputs.environment }}
      GCP_PROJECT: ${{ inputs.gcp_project }}
      GCP_REGION: ${{ inputs.gcp_region }}
      IMAGE_REPO: ${{ inputs.gcp_region }}-docker.pkg.dev/${{ inputs.gcp_project }}/${{ inputs.artifact_registry_repo }}
      IMAGE_TAG: ${{ github.sha }}
      TF_VAR_goldenpath_org: ${{ inputs.goldenpath_org }}
      TF_VAR_goldenpath_version: ${{ inputs.goldenpath_version }}
      TF_VAR_service_name: ${{ inputs.service_name }}
      TF_VAR_environment: ${{ inputs.environment }}
      TF_VAR_project_id: ${{ inputs.gcp_project }}
      TF_VAR_region: ${{ inputs.gcp_region }}
      TF_VAR_image_tag: ${{ github.sha }}
      TF_VAR_artifact_registry_repo: ${{ inputs.artifact_registry_repo }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        if: inputs.app_runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Node install
        if: inputs.app_runtime == 'node'
        run: npm ci

      - name: Node lint
        if: inputs.app_runtime == 'node'
        run: npm run lint --if-present

      - name: Node test
        if: inputs.app_runtime == 'node'
        run: npm test --if-present

      - name: Setup Python
        if: inputs.app_runtime == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip

      - name: Python install
        if: inputs.app_runtime == 'python'
        run: pip install -r requirements.txt

      - name: Python lint
        if: inputs.app_runtime == 'python'
        run: pip install ruff && ruff check . --ignore E501

      - name: Python test
        if: inputs.app_runtime == 'python'
        run: pip install pytest httpx && PYTHONPATH=. pytest -q

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          # gcloud credential helper — works with exported WIF creds (no empty access_token output).
          REGISTRY="${{ inputs.gcp_region }}-docker.pkg.dev"
          for attempt in 1 2 3; do
            if gcloud auth configure-docker "${REGISTRY}" --quiet \
              && gcloud auth print-access-token >/dev/null 2>&1; then
              exit 0
            fi
            echo "Artifact Registry docker auth attempt ${attempt} failed — retrying in 15s..."
            sleep 15
          done
          exit 1

      - name: Build and push image
        run: |
          if [[ "${IMAGE_REPO}" != *"-docker.pkg.dev/"* ]]; then
            echo "IMAGE_REPO must be an Artifact Registry URL: ${IMAGE_REPO}" >&2
            exit 1
          fi
          docker build -t "${IMAGE_REPO}/${SERVICE_NAME}:${IMAGE_TAG}" .
          docker push "${IMAGE_REPO}/${SERVICE_NAME}:${IMAGE_TAG}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Configure git for Terraform modules
        env:
          MODULE_TOKEN: ${{ secrets.GOLDENPATH_MODULE_TOKEN || github.token }}
        run: |
          git config --global url."https://x-access-token:${MODULE_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Terraform apply (staged + import + retry)
        working-directory: ${{ inputs.terraform_working_directory }}
        env:
          TF_VAR_service_name: ${{ inputs.service_name }}
          TF_VAR_environment: ${{ inputs.environment }}
          TF_VAR_project_id: ${{ inputs.gcp_project }}
          TF_VAR_region: ${{ inputs.gcp_region }}
          TF_VAR_image_tag: ${{ github.sha }}
          TF_VAR_artifact_registry_repo: ${{ inputs.artifact_registry_repo }}
        run: |
          set -euo pipefail
          ENVIRONMENT="${{ inputs.environment }}"
          SERVICE_NAME="${{ inputs.service_name }}"
          PROJECT_ID="${{ inputs.gcp_project }}"
          REGION="${{ inputs.gcp_region }}"
          AR_REPO="${{ inputs.artifact_registry_repo }}"
          IMAGE_TAG="${{ github.sha }}"

          ACCOUNT_ID="$(python3 -c "print('${SERVICE_NAME}-${ENVIRONMENT}-run'.replace('_','-')[:30])")"
          SA_EMAIL="${ACCOUNT_ID}@${PROJECT_ID}.iam.gserviceaccount.com"
          SECRET_ID="${SERVICE_NAME}-${ENVIRONMENT}-app-config"
          CLOUD_RUN="${SERVICE_NAME}-${ENVIRONMENT}"
          MEMBER="serviceAccount:${SA_EMAIL}"
          ACCESSOR_KEY="app-config-${MEMBER}"

          tf_import_args=(
            -input=false
            -var-file="${ENVIRONMENT}.tfvars"
            -var="project_id=${PROJECT_ID}"
            -var="service_name=${SERVICE_NAME}"
            -var="environment=${ENVIRONMENT}"
            -var="region=${REGION}"
            -var="artifact_registry_repo=${AR_REPO}"
            -var="image_tag=${IMAGE_TAG}"
          )
          tf_apply_args=(
            -input=false -auto-approve
            -var-file="${ENVIRONMENT}.tfvars"
            -var="image_tag=${IMAGE_TAG}"
          )

          import_if_missing() {
            local addr="$1" id="$2" check="$3"
            if terraform state show -no-color "${addr}" >/dev/null 2>&1; then return 0; fi
            if ! eval "${check}" >/dev/null 2>&1; then return 0; fi
            echo "==> import: ${addr}"
            terraform import "${tf_import_args[@]}" "${addr}" "${id}" || true
          }

          terraform init -input=false

          import_if_missing 'module.identity.google_service_account.runtime' \
            "projects/${PROJECT_ID}/serviceAccounts/${SA_EMAIL}" \
            "gcloud iam service-accounts describe '${SA_EMAIL}' --project='${PROJECT_ID}'"
          import_if_missing 'module.secrets.google_secret_manager_secret.secrets["app-config"]' \
            "projects/${PROJECT_ID}/secrets/${SECRET_ID}" \
            "gcloud secrets describe '${SECRET_ID}' --project='${PROJECT_ID}'"
          import_if_missing 'module.secrets.google_secret_manager_secret_version.bootstrap["app-config"]' \
            "projects/${PROJECT_ID}/secrets/${SECRET_ID}/versions/1" \
            "gcloud secrets versions describe 1 --secret='${SECRET_ID}' --project='${PROJECT_ID}'"
          if gcloud secrets describe "${SECRET_ID}" --project="${PROJECT_ID}" >/dev/null 2>&1; then
            import_if_missing "module.secrets.google_secret_manager_secret_iam_member.accessor[\"${ACCESSOR_KEY}\"]" \
              "projects/${PROJECT_ID}/secrets/${SECRET_ID} roles/secretmanager.secretAccessor ${MEMBER}" "true"
          fi
          import_if_missing 'module.cloud_run.google_cloud_run_v2_service.service' \
            "projects/${PROJECT_ID}/locations/${REGION}/services/${CLOUD_RUN}" \
            "gcloud run services describe '${CLOUD_RUN}' --project='${PROJECT_ID}' --region='${REGION}'"
          if gcloud run services describe "${CLOUD_RUN}" --project="${PROJECT_ID}" --region="${REGION}" >/dev/null 2>&1; then
            import_if_missing 'module.cloud_run.google_artifact_registry_repository_iam_member.runtime_reader' \
              "projects/${PROJECT_ID}/locations/${REGION}/repositories/${AR_REPO} roles/artifactregistry.reader ${MEMBER}" "true"
            if [[ "${ENVIRONMENT}" == "dev" ]]; then
              import_if_missing 'module.cloud_run.google_cloud_run_v2_service_iam_member.public_invoker[0]' \
                "projects/${PROJECT_ID}/locations/${REGION}/services/${CLOUD_RUN} roles/run.invoker allUsers" "true"
            fi
          fi

          echo "==> stage 1/3: module.identity"
          terraform apply "${tf_apply_args[@]}" -target=module.identity
          echo "==> stage 2/3: module.secrets"
          terraform apply "${tf_apply_args[@]}" -target=module.secrets
          echo "==> stage 3/3: full apply"
          for attempt in 1 2 3; do
            terraform plan -input=false -var-file="${ENVIRONMENT}.tfvars" -var="image_tag=${IMAGE_TAG}" -out=tfplan
            if terraform apply -input=false -auto-approve tfplan; then exit 0; fi
            echo "terraform apply attempt ${attempt} failed — re-importing and retrying in 20s..."
            import_if_missing 'module.identity.google_service_account.runtime' \
              "projects/${PROJECT_ID}/serviceAccounts/${SA_EMAIL}" \
              "gcloud iam service-accounts describe '${SA_EMAIL}' --project='${PROJECT_ID}'"
            import_if_missing 'module.secrets.google_secret_manager_secret.secrets["app-config"]' \
              "projects/${PROJECT_ID}/secrets/${SECRET_ID}" \
              "gcloud secrets describe '${SECRET_ID}' --project='${PROJECT_ID}'"
            import_if_missing 'module.cloud_run.google_cloud_run_v2_service.service' \
              "projects/${PROJECT_ID}/locations/${REGION}/services/${CLOUD_RUN}" \
              "gcloud run services describe '${CLOUD_RUN}' --project='${PROJECT_ID}' --region='${REGION}'"
            sleep 20
          done
          exit 1

      - name: Resolve service URL
        id: url
        run: |
          URL=$(gcloud run services describe "${SERVICE_NAME}-${ENVIRONMENT}" \
            --project="${GCP_PROJECT}" \
            --region="${GCP_REGION}" \
            --format='value(status.url)')
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Smoke check
        run: |
          curl --fail --retry 5 --retry-delay 5 "${{ steps.url.outputs.url }}${{ inputs.health_check_path }}"